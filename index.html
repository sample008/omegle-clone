<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat | Talk to Strangers</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        header {
            background-color: #1f1f1f;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 24px;
            font-weight: bold;
            color: #ff9800;
        }
        #chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background-color: #181818;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .msg.you {
            background-color: #ff9800;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.stranger {
            background-color: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            background-color: transparent;
            color: #888;
            font-style: italic;
            align-self: center;
            text-align: center;
            font-size: 14px;
        }
        .input-area { 
            display: flex; 
            padding: 15px; 
            background-color: #1f1f1f; 
            gap: 10px;
            border-top: 1px solid #333;
        }
        input { 
            flex: 1; 
            padding: 15px; 
            font-size: 16px; 
            border: 1px solid #444; 
            background-color: #2a2a2a; 
            color: #fff; 
            border-radius: 8px;
            outline: none;
        }
        input:disabled { background-color: #1a1a1a; color: #555; }
        button { 
            padding: 0 25px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        #skip-btn { background-color: #e53935; color: white; }
        #skip-btn:hover { background-color: #b71c1c; }
        #send-btn { background-color: #4caf50; color: white; }
        #send-btn:hover { background-color: #2e7d32; }
        #send-btn:disabled { background-color: #224424; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>AnonChat 💬</header>

    <div id="chat-box">
        <div class="msg system">Click "Next Stranger" to find someone to talk to...</div>
    </div>

    <div class="input-area">
        <button id="skip-btn" onclick="skipUser()">Next Stranger</button>
        <input type="text" id="message-input" placeholder="Type a message..." disabled onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', type);
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function skipUser() {
            appendMessage("Looking for a stranger...", "system");
            messageInput.disabled = true;
            sendBtn.disabled = true;
            socket.emit('find-match');
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if(text !== "") {
                appendMessage(`<strong>You:</strong> ${text}`, "you");
                messageInput.value = "";
                socket.emit('send-message', text);
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        socket.on('waiting', () => {
            appendMessage("Waiting for someone to join the lobby...", "system");
        });

        socket.on('matched', () => {
            appendMessage("Connected! You are now chatting with a random stranger.", "system");
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        });

        socket.on('receive-message', (text) => {
            appendMessage(`<strong>Stranger:</strong> ${text}`, "stranger");
        });

        socket.on('stranger-disconnected', () => {
            appendMessage("Stranger has disconnected.", "system");
            messageInput.disabled = true;
            sendBtn.disabled = true;
        });
    </script>
</body>
</html>
