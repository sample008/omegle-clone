<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat | Monetized Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        :root {
            --bg-body: #121212;
            --bg-surface: #1f1f1f;
            --bg-chat: #181818;
            --bg-input: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --border-color: #333;
            --stranger-msg: #2a2a2a;
            --stranger-text: #fff;
            --ad-bg: #222;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-surface: #ffffff;
            --bg-chat: #ffffff;
            --bg-input: #e4e6eb;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --border-color: #e4e6eb;
            --stranger-msg: #e4e6eb;
            --stranger-text: #1c1e21;
            --ad-bg: #f0f2f5;
        }

        body { font-family: '-apple-system', BlinkMacSystemFont, sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; }
        header { background-color: var(--bg-surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: bold; color: #ff9800; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .counter { background: var(--bg-input); padding: 6px 12px; border-radius: 20px; font-size: 14px; border: 1px solid var(--border-color); }
        .counter span { color: #4caf50; font-weight: bold; }
        .theme-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }

        /* --- NEW: ADVERTISEMENT BANNER ZONE --- */
        .ad-container {
            background-color: var(--ad-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ad-space {
            width: 100%;
            max-width: 728px; /* Standard web leaderboard ad size */
            height: 60px;
            border: 1px dashed #ff9800;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .interests-bar { background-color: var(--bg-surface); padding: 10px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .interests-bar input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 6px; flex: 1; font-size: 14px; outline: none; }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; background-color: var(--bg-chat); display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .msg.you { background-color: #ff9800; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.stranger { background-color: var(--stranger-msg); color: var(--stranger-text); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.system { background-color: transparent; color: var(--text-muted); font-style: italic; align-self: center; text-align: center; font-size: 14px; }
        
        #typing-status { padding-left: 20px; color: var(--text-muted); font-size: 14px; font-style: italic; height: 20px
